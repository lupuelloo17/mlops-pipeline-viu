name: CD — Deploy a AWS EC2

on:
  push:
    branches: [main]

env:
  IMAGE_NAME: iris-mlops-api

jobs:
  deploy:
    name: Build, Push y Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login a Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build y Push imagen
        uses: docker/build-push-action@v5
        with:
          context: .
          target: runtime
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy a EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            docker stop iris-mlops-api 2>/dev/null || true
            docker rm   iris-mlops-api 2>/dev/null || true
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/iris-mlops-api:latest
            docker run -d \
              --name iris-mlops-api \
              --restart unless-stopped \
              -p 80:8000 \
              -v iris_models:/app/models \
              ${{ secrets.DOCKERHUB_USERNAME }}/iris-mlops-api:latest
