name: CD — Deploy a AWS EC2

on:
  push:
    branches: [main]
  workflow_dispatch:        # permite lanzarlo a mano desde la pestaña Actions

env:
  IMAGE_NAME: iris-mlops-api

jobs:
  deploy:
    name: Build, Push y Deploy
    runs-on: ubuntu-latest

    steps:
      # ── 1. Código ───────────────────────────────────────────────────────────
      - name: Checkout código
        uses: actions/checkout@v4

      # ── 2. Verificar secrets antes de gastar minutos ────────────────────────
      - name: Verificar que existen los secrets
        run: |
          missing=0
          for s in DOCKERHUB_USERNAME DOCKERHUB_TOKEN EC2_HOST EC2_USER EC2_SSH_KEY; do
            if [ -z "${!s}" ]; then
              echo "❌ Falta el secret: $s"
              missing=1
            else
              echo "✅ Secret presente: $s"
            fi
          done
          [ $missing -eq 0 ] || exit 1
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USER: ${{ secrets.EC2_USER }}
          EC2_SSH_KEY: ${{ secrets.EC2_SSH_KEY }}

      # ── 3. Docker Buildx + login ────────────────────────────────────────────
      - name: Configurar Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login a Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # ── 4. Build y push de la imagen ────────────────────────────────────────
      - name: Build y Push imagen
        uses: docker/build-push-action@v5
        with:
          context: .
          target: runtime
          push: true
          no-cache: true
          platforms: linux/amd64           # EC2 t2.micro es x86_64
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:${{ github.sha }}

      # ── 5. Deploy por SSH a la EC2 ──────────────────────────────────────────
      # Usamos `key:` en vez de `key_path:` para evitar problemas de montaje del
      # contenedor de la action. EC2_SSH_KEY debe ser el contenido del .pem TAL
      # CUAL (con BEGIN/END), sin codificar en base64.
      - name: Deploy a EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          timeout: 60s
          command_timeout: 5m
          script: |
            set -e
            echo "▶ Comprobando Docker en la EC2..."
            if ! command -v docker >/dev/null 2>&1; then
              echo "Docker no está instalado. Instalando..."
              sudo yum update -y
              sudo yum install -y docker
              sudo systemctl enable --now docker
              sudo usermod -aG docker $USER
            fi

            echo "▶ Parando contenedor anterior si existe..."
            sudo docker stop iris-mlops-api 2>/dev/null || true
            sudo docker rm   iris-mlops-api 2>/dev/null || true

            echo "▶ Descargando nueva imagen..."
            sudo docker pull ${{ secrets.DOCKERHUB_USERNAME }}/iris-mlops-api:latest

            echo "▶ Arrancando contenedor..."
            sudo docker run -d \
              --name iris-mlops-api \
              --restart unless-stopped \
              -p 80:8000 \
              -v iris_models:/app/models \
              ${{ secrets.DOCKERHUB_USERNAME }}/iris-mlops-api:latest

            echo "▶ Esperando 5s y comprobando salud..."
            sleep 5
            curl -fsS http://localhost/health && echo "✅ API viva"

      # ── 6. Smoke test desde el runner ───────────────────────────────────────
      - name: Smoke test público
        run: |
          echo "▶ Probando http://${{ secrets.EC2_HOST }}/health"
          for i in 1 2 3 4 5; do
            if curl -fsS "http://${{ secrets.EC2_HOST }}/health"; then
              echo "✅ Despliegue OK"
              exit 0
            fi
            echo "Intento $i fallido, reintentando en 5s..."
            sleep 5
          done
          echo "❌ La API no responde en el puerto 80"
          exit 1
